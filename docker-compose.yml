# Local-dev compose for the Mac-side app-layer services (backend,
# frontend) — per Hardware Distribution, these normally run natively on
# the Mac dev machine, not containerized; this file exists for local
# containerized dev/testing convenience on top of that, not a
# replacement for it.
#
# ai_service is NOT here — per Hardware Distribution it runs on the
# Windows RTX PC (it needs LLM inference/embeddings, which the Mac
# explicitly does not run), alongside postgres/chromadb/ollama — see
# docker-compose.windows.yml at the repo root for that scope.
services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
