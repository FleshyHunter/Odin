server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React Router owns client-side routes (/chat, /projects, /tracks,
    # /signin, /signup, etc.) — none of those exist as real files, so a
    # hard reload/direct link on any of them must fall back to
    # index.html and let the app's own router handle it, not 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
