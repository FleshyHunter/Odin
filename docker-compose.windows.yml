# Windows-side compose — the services Hardware Distribution assigns to
# the Windows RTX PC: postgres, chromadb, ai_service, ollama. This is a
# DIFFERENT scope from the root docker-compose.yml, which is Mac-only
# local-dev convenience for the app-layer services (backend, frontend)
# that normally run natively per Hardware Distribution.
#
# Redis is deliberately NOT included here — it's currently running
# natively via Memurai on Windows, not containerized. Revisit separately
# if that changes.
#
# Requires a .env file alongside this one (gitignored, Windows-side
# only) with at least POSTGRES_PASSWORD set for the admin/bootstrap
# "odin" role — never commit a real value into this file. Note this
# only bootstraps that one admin role; the restricted odin_app role
# (used by DATABASE_URL in backend/.env) still has to be created
# separately, the same manual step already done on the real Windows
# Postgres instance — not yet automated here.
#
# Block 10 (Dify): that same .env also needs DIFY_ACQUIRE_API_KEY,
# DIFY_DAG_API_KEY, DIFY_EXERCISE_TEMPLATE_API_KEY (one per Dify app —
# see ai_service/app/acquisition/ and its setup notes), plus optionally
# DIFY_BASE_URL if self-hosting instead of Dify Cloud. Until these are
# set, /acquire, /generate_dag, /generate_exercise_template each return
# a clean 503 rather than failing to boot — see .env.example.
services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: odin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: odin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  chromadb:
    image: chromadb/chroma
    restart: unless-stopped
    ports:
      # Host 8001, not 8000 — 8000 is the FastAPI AI service's locked
      # port (ARCHITECTURE.md Ports table); this only avoids a host-port
      # collision between the two containers, not a locked value itself.
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma

  ai_service:
    build:
      context: ./ai_service
    restart: unless-stopped
    environment:
      # Ollama is currently running natively on Windows (this compose
      # file's own `ollama` service below is unused while that's true)
      # — from inside this container, `localhost` means the container
      # itself, not the Windows host, so reaching a natively-running
      # service requires host.docker.internal (Docker Desktop's bridge
      # back to the host), not a plain localhost/127.0.0.1 URL.
      OLLAMA_HOST: http://host.docker.internal:11434
      # Block 10 (Dify) — all optional at the compose level: unset
      # means the corresponding env var is simply absent inside the
      # container, which ai_service already handles as "not configured
      # yet" (503), not a crash. DIFY_BASE_URL only needs setting if
      # self-hosting Dify rather than using Dify Cloud (defaults to
      # https://api.dify.ai in code if left unset here).
      DIFY_BASE_URL: ${DIFY_BASE_URL:-}
      DIFY_ACQUIRE_API_KEY: ${DIFY_ACQUIRE_API_KEY:-}
      DIFY_DAG_API_KEY: ${DIFY_DAG_API_KEY:-}
      DIFY_EXERCISE_TEMPLATE_API_KEY: ${DIFY_EXERCISE_TEMPLATE_API_KEY:-}
    ports:
      - "8000:8000"

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Requires the NVIDIA Container Toolkit (and, on Windows, Docker
    # Desktop's WSL2 GPU passthrough) already set up on the host —
    # without it this silently falls back to CPU-only inference on the
    # RTX 3060 sitting right there, defeating the point of this hardware.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  postgres_data:
  chromadb_data:
  ollama_data:
